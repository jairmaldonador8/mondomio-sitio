<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opciones de Logos - Mondomío</title>
<style>
:root{
  --sky:#6CC9EC; --sky-deep:#46B2DD;
  --lime:#8CC63E; --pink:#C0539F; --pink-d:#A6408A;
  --yellow:#FAC81C; --navy:#322B7A; --ink:#262223; --paper:#ffffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--sky);
  padding: 40px 20px;
  color: var(--ink);
}
.wrap { width: min(1200px, 95vw); margin: auto; }
h1 { text-align: center; margin-bottom: 50px; font-size: 2.5em; text-transform: uppercase; color: var(--navy); }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
.card {
  background: var(--paper);
  border-radius: 20px;
  padding: 25px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(50, 43, 122, 0.15);
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
}
.card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(50, 43, 122, 0.25); }
.category { font-weight: bold; color: var(--pink-d); font-size: 0.85em; letter-spacing: 1px; margin-bottom: 15px; }
.logos-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
.logo-option {
  background: #f5f5f5;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  border: 2px solid transparent;
  transition: all 0.3s;
  cursor: pointer;
}
.logo-option:hover {
  border-color: var(--pink);
  background: #fef0f7;
}
.logo-option svg { width: 80px; height: 80px; margin: 0 auto 10px; }
.logo-option p { font-size: 0.9em; color: var(--ink); margin-top: 8px; font-weight: 600; }
.selection { margin-top: 20px; padding-top: 20px; border-top: 2px solid #eee; }
.selection textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--pink-d);
  border-radius: 10px;
  font-size: 0.9em;
  font-family: monospace;
  height: 60px;
  resize: vertical;
}
.buttons { display: flex; gap: 10px; margin-top: 15px; }
button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-select {
  background: var(--lime);
  color: white;
}
.btn-select:hover { background: var(--lime); filter: brightness(0.9); }
.btn-deselect {
  background: #ccc;
  color: var(--ink);
}
.btn-deselect:hover { background: #bbb; }
.selected {
  border-color: var(--lime) !important;
  background: #f0fdf4 !important;
  box-shadow: 0 0 0 3px rgba(140, 198, 62, 0.2);
}
.summary {
  background: var(--paper);
  padding: 30px;
  border-radius: 20px;
  margin-top: 40px;
  box-shadow: 0 10px 30px rgba(50, 43, 122, 0.15);
}
.summary h2 { color: var(--navy); margin-bottom: 20px; }
.summary ul { list-style: none; }
.summary li { padding: 10px 0; font-size: 1.1em; }
.summary li::before { content: "✓ "; color: var(--lime); font-weight: bold; margin-right: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎨 Opciones de Logos</h1>

  <div class="grid" id="grid"></div>

  <div class="summary">
    <h2>📝 Tus selecciones</h2>
    <ul id="selection-list"></ul>
  </div>
</div>

<script>
const categories = [
  {
    name: "LANGUAGE & READING",
    options: [
      { name: "Pajarito Leyendo", icon: "pajarito" },
      { name: "Araña Tejiendo Letras", icon: "arana" }
    ]
  },
  {
    name: "MATH & SCIENCE",
    options: [
      { name: "Abeja Hexágonos", icon: "abeja" },
      { name: "Caracol Espirales", icon: "caracol" }
    ]
  },
  {
    name: "BASIC SKILLS",
    options: [
      { name: "Rana Saltando", icon: "rana" },
      { name: "Catarina Puntos", icon: "catarina" }
    ]
  },
  {
    name: "PRETEND CONSTRUCTION",
    options: [
      { name: "Araña Telaraña", icon: "arana" },
      { name: "Gato con Bloques", icon: "gato" }
    ]
  },
  {
    name: "SENSORY",
    options: [
      { name: "Catarina Flores", icon: "catarina" },
      { name: "Libélula Explorando", icon: "libelula" }
    ]
  },
  {
    name: "ART",
    options: [
      { name: "Pajarito Colorido", icon: "pajarito" },
      { name: "Gato Paleta", icon: "gato" }
    ]
  },
  {
    name: "GYM",
    options: [
      { name: "Rana Saltando", icon: "rana" },
      { name: "Pajarito Volando", icon: "pajarito" }
    ]
  },
  {
    name: "MUSIC",
    options: [
      { name: "Pajarito Cantando", icon: "pajarito" },
      { name: "Gato Instrumento", icon: "gato" }
    ]
  }
];

const selections = {};

function createSVG(type) {
  const svgs = {
    pajarito: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="50" r="25" fill="#F4A460"/>
      <circle cx="35" cy="45" r="20" fill="#FFB347"/>
      <circle cx="30" cy="40" r="8" fill="white"/>
      <circle cx="28" cy="38" r="4" fill="black"/>
      <path d="M 50 65 L 45 80 L 55 80 Z" fill="#FF6B6B"/>
      <path d="M 15 50 L 5 48 L 10 50 Z" fill="#FFB347"/>
      <path d="M 75 45 L 92 42 L 80 48 Z" fill="#FFB347"/>
    </svg>`,
    arana: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="40" r="15" fill="#8B4789"/>
      <circle cx="50" cy="60" r="12" fill="#7A3F7A"/>
      <line x1="35" y1="50" x2="15" y2="40" stroke="#8B4789" stroke-width="2"/>
      <line x1="65" y1="50" x2="85" y2="40" stroke="#8B4789" stroke-width="2"/>
      <line x1="30" y1="60" x2="10" y2="75" stroke="#8B4789" stroke-width="2"/>
      <line x1="70" y1="60" x2="90" y2="75" stroke="#8B4789" stroke-width="2"/>
      <circle cx="45" cy="35" r="2" fill="white"/>
      <circle cx="55" cy="35" r="2" fill="white"/>
    </svg>`,
    rana: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="55" rx="28" ry="32" fill="#7CB342"/>
      <circle cx="35" cy="35" r="15" fill="#7CB342"/>
      <circle cx="65" cy="35" r="15" fill="#7CB342"/>
      <circle cx="30" cy="30" r="6" fill="white"/>
      <circle cx="28" cy="28" r="3" fill="black"/>
      <circle cx="70" cy="30" r="6" fill="white"/>
      <circle cx="72" cy="28" r="3" fill="black"/>
      <path d="M 35 65 L 25 75 L 35 73 Z" fill="#7CB342"/>
      <path d="M 65 65 L 75 75 L 65 73 Z" fill="#7CB342"/>
    </svg>`,
    abeja: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="50" rx="20" ry="25" fill="#FFD700"/>
      <ellipse cx="50" cy="50" rx="15" ry="20" fill="#FFB347" opacity="0.7"/>
      <ellipse cx="50" cy="50" rx="10" ry="15" fill="#FFD700" opacity="0.7"/>
      <circle cx="50" cy="30" r="10" fill="#FFD700"/>
      <circle cx="45" cy="27" r="2" fill="black"/>
      <circle cx="55" cy="27" r="2" fill="black"/>
      <path d="M 30 40 L 20 35 L 25 45 Z" fill="#808080"/>
      <path d="M 70 40 L 80 35 L 75 45 Z" fill="#808080"/>
      <path d="M 35 35 L 25 20 L 40 30 Z" fill="#808080"/>
      <path d="M 65 35 L 75 20 L 60 30 Z" fill="#808080"/>
    </svg>`,
    caracol: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M 50 80 Q 35 75 35 60 Q 35 40 50 35 Q 65 40 65 60 Q 65 75 50 80 Z" fill="#D2691E"/>
      <path d="M 50 75 Q 40 72 40 60 Q 40 45 50 42 Q 60 45 60 60 Q 60 72 50 75 Z" fill="#CD853F"/>
      <circle cx="45" cy="60" r="8" fill="#8B4513"/>
      <circle cx="45" cy="35" r="6" fill="#8B4513"/>
      <line x1="45" y1="30" x2="40" y2="20" stroke="#8B4513" stroke-width="2"/>
      <line x1="45" y1="30" x2="50" y2="20" stroke="#8B4513" stroke-width="2"/>
    </svg>`,
    catarina: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="55" rx="30" ry="35" fill="#E63946"/>
      <ellipse cx="50" cy="35" rx="20" ry="18" fill="#E63946"/>
      <ellipse cx="50" cy="65" rx="28" ry="20" fill="#E63946"/>
      <circle cx="50" cy="40" r="4" fill="black"/>
      <circle cx="48" cy="38" r="1.5" fill="white"/>
      <circle cx="35" cy="55" r="6" fill="black"/>
      <circle cx="50" cy="70" r="6" fill="black"/>
      <circle cx="65" cy="55" r="6" fill="black"/>
      <path d="M 30 75 L 20 85 L 28 80 Z" fill="#2A2A2A"/>
      <path d="M 70 75 L 80 85 L 72 80 Z" fill="#2A2A2A"/>
    </svg>`,
    gato: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="55" r="30" fill="#FF9F43"/>
      <path d="M 25 30 L 15 15 L 30 35 Z" fill="#FF9F43"/>
      <path d="M 75 30 L 85 15 L 70 35 Z" fill="#FF9F43"/>
      <circle cx="40" cy="50" r="5" fill="white"/>
      <circle cx="38" cy="50" r="3" fill="black"/>
      <circle cx="60" cy="50" r="5" fill="white"/>
      <circle cx="62" cy="50" r="3" fill="black"/>
      <circle cx="50" cy="65" r="4" fill="#FF69B4"/>
      <line x1="50" y1="68" x2="45" y2="75" stroke="#2A2A2A" stroke-width="1.5"/>
      <line x1="50" y1="68" x2="55" y2="75" stroke="#2A2A2A" stroke-width="1.5"/>
    </svg>`,
    libelula: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="50" rx="8" ry="20" fill="#00CEC9"/>
      <ellipse cx="50" cy="50" rx="5" ry="15" fill="#00B8A9"/>
      <circle cx="50" cy="35" r="6" fill="#00CEC9"/>
      <circle cx="48" cy="33" r="1.5" fill="black"/>
      <circle cx="52" cy="33" r="1.5" fill="black"/>
      <path d="M 35 45 Q 20 35 15 50 Q 20 45 35 50 Z" fill="#74B9FF" opacity="0.8"/>
      <path d="M 65 45 Q 80 35 85 50 Q 80 45 65 50 Z" fill="#74B9FF" opacity="0.8"/>
      <path d="M 35 55 Q 20 65 15 50 Q 20 55 35 50 Z" fill="#74B9FF" opacity="0.8"/>
      <path d="M 65 55 Q 80 65 85 50 Q 80 55 65 50 Z" fill="#74B9FF" opacity="0.8"/>
    </svg>`
  };
  return svgs[type] || '';
}

function init() {
  const grid = document.getElementById('grid');

  categories.forEach((cat, idx) => {
    const card = document.createElement('div');
    card.className = 'card';

    let html = `<div class="category">${cat.name}</div><div class="logos-container">`;

    cat.options.forEach((opt, optIdx) => {
      const optionId = `${idx}-${optIdx}`;
      html += `
        <div class="logo-option" id="opt-${optionId}" onclick="toggleSelection('${optionId}', '${cat.name}', '${opt.name}')">
          ${createSVG(opt.icon)}
          <p>${opt.name}</p>
        </div>
      `;
    });

    html += `</div>`;
    card.innerHTML = html;
    grid.appendChild(card);
  });
}

function toggleSelection(id, category, name) {
  const opt = document.getElementById(`opt-${id}`);

  if (selections[category]) {
    // Si ya hay una selección, deseleccionarla
    const prevId = selections[category].id;
    document.getElementById(`opt-${prevId}`).classList.remove('selected');
    if (selections[category].id === id) {
      delete selections[category];
      updateSummary();
      return;
    }
  }

  selections[category] = { id, name };
  opt.classList.add('selected');
  updateSummary();
}

function updateSummary() {
  const list = document.getElementById('selection-list');
  list.innerHTML = '';

  Object.keys(selections).sort().forEach(cat => {
    const li = document.createElement('li');
    li.textContent = `${cat}: ${selections[cat].name}`;
    list.appendChild(li);
  });
}

init();
</script>
</body>
</html>
